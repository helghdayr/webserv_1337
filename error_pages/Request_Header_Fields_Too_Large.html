<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>431 Request Header Fields Too Large</title>
  <style>
    body {
      background-color: #f8f9fa;
      color: #212529;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 48px;
      color: #c0392b;
    }
    p {
      font-size: 18px;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>431 Request Header Fields Too Large</h1>
  <p>The server was unable to process the request because the header fields are too large. Please reduce the size of your request headers and try again.</p>
</body>
</html>
