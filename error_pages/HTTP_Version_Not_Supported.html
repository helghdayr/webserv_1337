<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>505 HTTP Version Not Supported</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0f7fa;
      color: #006064;
      text-align: center;
      padding: 60px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>505 HTTP Version Not Supported</h1>
  <p>The server does not support the HTTP protocol version used in the request.</p>
  <p>Please check your client configuration and try again with a supported HTTP version (like HTTP/1.1).</p>
</body>
</html>
