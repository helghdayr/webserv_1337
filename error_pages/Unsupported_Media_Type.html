<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>415 Unsupported Media Type</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8e1;
      color: #d9822b;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>415 Unsupported Media Type</h1>
  <p>The server refuses to accept the request because the payload format is not supported.</p>
  <p>Please check the <code>Content-Type</code> header and ensure you are sending a supported media type.</p>
</body>
</html>
