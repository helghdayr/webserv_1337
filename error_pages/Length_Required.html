<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>411 Length Required</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff3f3;
      color: #a94442;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      max-width: 600px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <h1>411 Length Required</h1>
  <p>The server refuses to accept the request without a valid <code>Content-Length</code> header.</p>
  <p>Please include a <code>Content-Length</code> header indicating the size of the request body.</p>
</body>
</html>
