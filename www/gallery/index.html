<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .upload-section {
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .upload-button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .upload-button:hover {
            background-color: #0056b3;
        }
        
        .upload-button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .image-item {
            background: white;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .image-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .image-name {
            padding: 10px;
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }
        
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gallery</h1>
        
        <div class="upload-section">
            <form id="upload-form">
                <input type="file" name="file" accept="image/*" required>
                <button type="submit" class="upload-button" id="upload-btn">Upload Image</button>
            </form>
            <div id="status" class="status"></div>
        </div>
        
        <div class="gallery" id="gallery">
            <!-- Images will be loaded here -->
        </div>
    </div>

    <script>
        function loadImages() {
            fetch('/uploads/')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const links = doc.querySelectorAll('a[href$=".jpg"], a[href$=".jpeg"], a[href$=".png"], a[href$=".gif"], a[href$=".webp"]');
                    
                    const gallery = document.getElementById('gallery');
                    gallery.innerHTML = '';
                    
                    links.forEach(link => {
                        const imageName = link.textContent;
                        const imageUrl = '/uploads/' + imageName;
                        
                        const imageItem = document.createElement('div');
                        imageItem.className = 'image-item';
                        imageItem.innerHTML = `
                            <img src="${imageUrl}" alt="${imageName}" onerror="this.style.display='none'">
                            <div class="image-name">${imageName}</div>
                        `;
                        gallery.appendChild(imageItem);
                    });
                })
                .catch(error => {
                    console.error('Error loading images:', error);
                });
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        document.getElementById('upload-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const uploadBtn = document.getElementById('upload-btn');
            
            // Disable button during upload
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    showStatus('Upload successful!', 'success');
                    this.reset();
                    loadImages();
                } else {
                    throw new Error(`Upload failed: ${response.status}`);
                }
            })
            .catch(error => {
                console.error('Upload error:', error);
                showStatus('Upload failed: ' + error.message, 'error');
            })
            .finally(() => {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload Image';
            });
        });
        
        loadImages();
    </script>
</body>
</html>
