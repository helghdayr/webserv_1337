<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e8e8e8;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #4fc3f7;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }
        
        .upload-section {
            margin-bottom: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .upload-section h3 {
            color: #81c784;
            margin-bottom: 15px;
        }
        
        .file-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            color: #e8e8e8;
            margin-right: 10px;
        }
        
        .upload-button {
            background: linear-gradient(45deg, #4fc3f7, #29b6f6);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
        }
        
        .upload-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 195, 247, 0.4);
        }
        
        .upload-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .image-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        
        .image-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        .image-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .image-name {
            color: #e8e8e8;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 10px;
            word-break: break-word;
        }
        
        .image-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .delete-btn {
            background: linear-gradient(45deg, #ff5722, #f44336);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3);
        }
        
        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 87, 34, 0.4);
            background: linear-gradient(45deg, #f44336, #ff5722);
        }
        
        .delete-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .empty-gallery {
            grid-column: 1 / -1;
            text-align: center;
            color: #888;
            font-size: 1.1rem;
            padding: 40px;
        }
        
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }
        
        .status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }
        
        .status.warning {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }
        
        .confirmation-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
        }
        
        .modal-title {
            color: #ff5722;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }
        
        .modal-message {
            color: #e8e8e8;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #e8e8e8;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .modal-btn.confirm {
            background: linear-gradient(45deg, #ff5722, #f44336);
            color: white;
        }
        
        .modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Back to Home</a>
    
    <div class="container">
        <div class="header">
            <h1>Image Gallery</h1>
            <p>Upload, view, and manage your images</p>
        </div>
        
        <div class="upload-section">
            <h3>Upload New Image</h3>
            <form id="upload-form">
                <input type="file" name="file" accept="image/*" required class="file-input">
                <button type="submit" class="upload-button" id="upload-btn">Upload Image</button>
            </form>
            <div id="status" class="status"></div>
        </div>
        
        <div class="gallery" id="gallery">
            <div class="empty-gallery">Loading images...</div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="confirmation-modal" id="confirmation-modal">
        <div class="modal-content">
            <div class="modal-title">Confirm Delete</div>
            <div class="modal-message" id="modal-message">Are you sure you want to delete this image?</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn confirm" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let currentDeleteTarget = null;
        
        function loadImages() {
            fetch('/uploads/')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const links = doc.querySelectorAll('a[href$=".jpg"], a[href$=".jpeg"], a[href$=".png"], a[href$=".gif"], a[href$=".webp"]');
                    
                    const gallery = document.getElementById('gallery');
                    gallery.innerHTML = '';
                    
                    if (links.length === 0) {
                        gallery.innerHTML = '<div class="empty-gallery">No images found. Upload some images to get started!</div>';
                        return;
                    }
                    
                    links.forEach(link => {
                        const imageName = link.textContent;
                        const imageUrl = '/uploads/' + imageName;
                        
                        const imageItem = document.createElement('div');
                        imageItem.className = 'image-item';
                        imageItem.innerHTML = `
                            <img src="${imageUrl}" alt="${imageName}" onerror="this.style.display='none'">
                            <div class="image-name">${imageName}</div>
                            <div class="image-actions">
                                <button class="delete-btn" onclick="confirmDelete('${imageName}')">Delete</button>
                            </div>
                        `;
                        gallery.appendChild(imageItem);
                    });
                })
                .catch(error => {
                    console.error('Error loading images:', error);
                    document.getElementById('gallery').innerHTML = '<div class="empty-gallery">Error loading images. Please try again.</div>';
                });
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        function confirmDelete(imageName) {
            currentDeleteTarget = imageName;
            document.getElementById('modal-message').textContent = `Are you sure you want to delete "${imageName}"? This action cannot be undone.`;
            document.getElementById('confirmation-modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('confirmation-modal').style.display = 'none';
            currentDeleteTarget = null;
        }
        
        function deleteImage(imageName) {
            const deleteBtn = event.target;
            deleteBtn.disabled = true;
            deleteBtn.textContent = 'Deleting...';
            
            fetch(`/uploads/${imageName}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    showStatus(`Successfully deleted "${imageName}"`, 'success');
                    loadImages(); // Reload the gallery
                } else {
                    throw new Error(`Delete failed: ${response.status}`);
                }
            })
            .catch(error => {
                console.error('Delete error:', error);
                showStatus('Delete failed: ' + error.message, 'error');
            })
            .finally(() => {
                deleteBtn.disabled = false;
                deleteBtn.textContent = 'Delete';
                closeModal();
            });
        }
        
        // Set up confirm delete button
        document.getElementById('confirm-delete-btn').addEventListener('click', function() {
            if (currentDeleteTarget) {
                deleteImage(currentDeleteTarget);
            }
        });
        
        // Close modal when clicking outside
        document.getElementById('confirmation-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        document.getElementById('upload-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const uploadBtn = document.getElementById('upload-btn');
            
            // Disable button during upload
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    showStatus('Upload successful!', 'success');
                    this.reset();
                    loadImages();
                } else {
                    throw new Error(`Upload failed: ${response.status}`);
                }
            })
            .catch(error => {
                console.error('Upload error:', error);
                showStatus('Upload failed: ' + error.message, 'error');
            })
            .finally(() => {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload Image';
            });
        });
        
        loadImages();
    </script>
</body>
</html>
