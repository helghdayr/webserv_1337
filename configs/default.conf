	}
}

server {
	server_name webserv;
	listen 0.0.0.0:4243;

	root ./www/html;
	index index.html;

	allowed_methods GET;

	autoindex off;
	client_max_body_size 256 ;

	location /board {
		allowed_methods GET DELETE;
		root ./www/html;
	}

	location /board/post {
		return 103;
		allowed_methods POST;
		root ./www/html/contents;
	}

	location /cgi {
		allowed_methods GET;
		cgi_info cgi_tester hello_world;
	}
}

