server {
    listen 0.0.0.0:8004;
    root ./;
    allowed_methods GET POST DELETE;
    client_max_body_size 1GB;
	client_timeout 9;
	client_header_timeout 6;
    autoindex on;

    location / {
        root ./www/html;
        allowed_methods GET POST DELETE;
        index index.html;
    }

    location /gallery {
        root ./www/gallery;
        index index.html;
        allowed_methods GET POST DELETE;
    }

    location /uploads {
        root ./uploads;
        upload_store ./uploads;
        allowed_methods GET POST DELETE;
    }

    location /cgi-bin {
        root ./www/cgi-bin/;
        allowed_methods GET POST;
        index cgi_test.html;

        cgi_info .py /usr/bin/python3;
        cgi_info .sh /usr/bin/bash;
        cgi_info .js /usr/bin/node;
        cgi_info .php /usr/bin/php;

        cgi_info .c "gcc -o {OUTPUT} {INPUT} && {OUTPUT}";
        cgi_info .cpp "g++ -o {OUTPUT} {INPUT} && {OUTPUT}";
        cgi_info .java "javac {INPUT} && java {INPUT}";
    }
}

