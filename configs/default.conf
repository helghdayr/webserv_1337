server {
	server_name webserv;
	listen localhost:42;

	root ./www/html;

	allowed_methods GET;

	autoindex on;
	index index.html index2.html;
	client_max_body_size 4096;

	error_page 404 405 ./www/html/error/error.html;
	error_page 500 ./www/html/error/error2.html;

	location /board {
		allowed_methods GET;
		root ./www/html/board;
	}

	location /board/content {
		allowed_methods GET POST DELETE;
		root ./www/html/contents;
		index board.html;
		cgi_info .php php-cgi;
	}
	
	location /cgi {
		allowed_methods GET POST;
		cgi_info php php-fpm;
	}
}

server {
	server_name another_webserv;
	listen 0.0.0.0:4242;

	root ./www/html;

	allowed_methods GET;

	client_max_body_size 256;

	location /board {
		allowed_methods GET;
		root ./www/html;
	}

	location /board/content {
		allowed_methods GET POST DELETE;
